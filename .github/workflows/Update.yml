name: update

on:
    # Enable manual deployment
    workflow_dispatch:
    # This runs on the 37th minute of every hour, which is a random number we choose to
    # avoid peak minutes around :00 and :30
    schedule:
        - cron: "37 * * * *"

jobs:
    linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Download prefabricator 💝
                env:
                    MIRROR: "https://download.rarestype.com/swift-ip"
                run: |
                    LATEST=$(
                        gh api "repos/${GITHUB_REPOSITORY}/tags" --paginate --jq '.[].name' \
                        | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' \
                        | sort -rV | head -n 1 \
                    )
                    curl \
                        -sSfL "${MIRROR}/${LATEST}/Linux-$(uname -m)/prefabricator.gz" \
                        -o prefabricator
                    chmod +x prefabricator

            -   name: 💝 Build blocklist image 💝
                env:
                    IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
                run: Scripts/Update prefabricator

            -   name: 💝 Upload blocklist image 💝
                run: |
                    aws s3 cp firewall.bson.gz s3://swiftinit/ip/firewall.bson.gz \
                        --content-encoding gzip \
                        --content-type application/bson
