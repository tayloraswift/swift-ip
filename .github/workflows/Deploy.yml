name: Deploy

permissions:
    contents: write
on:
    workflow_dispatch:
        inputs:
            version:
                description: 'The version to deploy'
                required: true
                type: string
    workflow_call:
        inputs:
            version:
                description: 'The version to deploy'
                required: true
                type: string

jobs:
    Linux:
        strategy:
            matrix:
                runner:
                    -   name: "Ubuntu (aarch64)"
                        arch: aarch64
                        id: ubuntu-24.04-arm

        runs-on: ${{ matrix.runner.id }}
        name: ${{ matrix.runner.name }}
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v6
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Install Swift 💝
                uses: rarestype/swift-install-action@v1
                with:
                    swift-release: 6.3-RELEASE

            -   name: 💝 Build prefabricator 💝
                run: |
                    swift build -c release \
                        --explicit-target-dependency-import-check=error \
                        --static-swift-stdlib \
                        --product swift-ip-prefabricator
                    cp .build/release/swift-ip-prefabricator .

            -   name: 💝 Build blocklist image 💝
                env:
                    IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
                run: Scripts/Update swift-ip-prefabricator

            -   name: 💝 Test blocklist image 💝
                run: swift run -c release FirewallUsage 98.223.208.128

            -   name: 💝 Deploy prefabricator 💝
                env:
                    APP: "swift-ip"
                    DEPLOY_VERSION: ${{ inputs.version }}
                run: Scripts/Deploy

            -   name: 💝 Update badge 💝
                uses: rarestype/rarestbadge@v1
                if: always()
                with:
                    badge: SemanticRelease/${{ github.job }}-${{ matrix.runner.arch }}
                    title: Release
