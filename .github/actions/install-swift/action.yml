name: "Auto Swift install"
description: "Automatically configure and install Swift based on the runner OS"

runs:
    using: composite
    steps:
        -   name: Determine Swift Parameters
            id: parameters
            shell: bash
            env:
                SWIFT_VERSION: 6.3
            run: |
                if [ "$RUNNER_OS" == "Linux" ]; then
                    # Extract the Ubuntu version (e.g., "24.04")
                    UBUNTU_VERSION=$(lsb_release -rs)

                    # Format variables for the download URL
                    OS_AND_ARCH="ubuntu${UBUNTU_VERSION}"

                    # Append -aarch64 if running on an ARM Linux runner
                    if [ "$(uname -m)" == "aarch64" ]; then
                        OS_AND_ARCH+="-aarch64"
                    fi

                    OS_DOTLESS="${OS_AND_ARCH//./}"
                    OS_DOTTED="${OS_AND_ARCH}"

                    # Linux specific URL parts
                    PREFIX="swift-${SWIFT_VERSION}-release/${OS_DOTLESS}/swift-${SWIFT_VERSION}-RELEASE"
                    ID="swift-${SWIFT_VERSION}-RELEASE-${OS_DOTTED}"

                elif [ "$RUNNER_OS" == "macOS" ]; then
                    # macOS specific URL parts. The swift-id does not include a distribution name
                    PREFIX="swift-${SWIFT_VERSION}-release/xcode/swift-${SWIFT_VERSION}-RELEASE"
                    ID="swift-${SWIFT_VERSION}-RELEASE"

                else
                    echo "Unsupported OS: $RUNNER_OS"
                    exit 1
                fi

                # Set the outputs to be passed to the install action
                echo "swift-prefix=$PREFIX" >> $GITHUB_OUTPUT
                echo "swift-id=$ID" >> $GITHUB_OUTPUT

        -   name: Install Swift
            uses: rarestype/swift-install-action@master
            with:
                swift-prefix: ${{ steps.parameters.outputs.swift-prefix }}
                swift-id: ${{ steps.parameters.outputs.swift-id }}
